name: CD — build and push Docker images

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to rebuild (leave empty for all changed)'
        required: false
        type: string

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.list.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: list
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.app }}" ]]; then
            echo "apps=[\"${{ github.event.inputs.app }}\"]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # List apps directories (excluding placeholders) that contain a Dockerfile
          apps=()
          for dir in apps/*/; do
            name="$(basename "$dir")"
            if [[ -f "${dir}Dockerfile" && "$name" != "_template-vs" ]]; then
              apps+=("\"$name\"")
            fi
          done
          if [[ ${#apps[@]} -eq 0 ]]; then
            echo "apps=[]" >> "$GITHUB_OUTPUT"
          else
            IFS=,; echo "apps=[${apps[*]}]" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & push ${{ matrix.app }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.apps != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          short="$(git rev-parse --short HEAD)"
          echo "tag=${short}" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.app }}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:latest
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
